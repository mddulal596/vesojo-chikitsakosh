<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভেষজ চিকিৎসা কোষ | ১৪১টি ঔষধি গাছের তালিকা</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #2d5a27;
            --accent-gold: #ffb100;
            --dark-bg: #1a3317;
            --light-bg: #f0f7ef;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--light-bg); color: #333; }

        /* Navigation */
        nav {
            position: sticky; top: 0; z-index: 1000; background: var(--dark-bg);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; height: 80px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .logo { color: #fff; text-decoration: none; font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .social-icons-nav { display: flex; gap: 15px; }
        .social-icons-nav a { color: #fff; font-size: 18px; transition: 0.3s; }
        .social-icons-nav a:hover { color: var(--accent-gold); }

        .auth-buttons { display: flex; gap: 10px; border-left: 1px solid #444; padding-left: 20px; }
        .btn { padding: 8px 18px; border-radius: 5px; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .btn-login { color: #fff; border: 1px solid #fff; }
        .btn-login:hover { background: #fff; color: var(--dark-bg); }
        .btn-signup { background: var(--accent-gold); color: #000; }
        .btn-signup:hover { background: #e6a000; }

        /* Hero Section */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1515248137880-45e105b710e0?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            color: #fff; text-align: center; padding: 100px 20px;
        }
        header h1 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 1px; }

        /* Search Bar */
        .search-area { max-width: 600px; margin: -30px auto 50px; padding: 0 20px; }
        #searchInput {
            width: 100%; padding: 18px 30px; border: none; border-radius: 50px;
            font-size: 18px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); outline: none;
        }

        /* Grid System */
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .plant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .plant-card {
            background: #fff; border-radius: 15px; padding: 20px; text-align: center;
            text-decoration: none; color: inherit; transition: 0.4s;
            border-bottom: 4px solid transparent;
        }
        .plant-card:hover { 
            transform: translateY(-10px); 
            border-bottom: 4px solid var(--primary-green);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .plant-card i { font-size: 30px; color: var(--primary-green); margin-bottom: 10px; }
        .plant-card span { display: block; font-weight: 700; font-size: 1.1rem; }

        /* Footer */
        footer { background: var(--dark-bg); color: #fff; padding: 50px 20px 20px; text-align: center; margin-top: 80px; }
        .footer-social { margin-bottom: 30px; display: flex; justify-content: center; gap: 25px; }
        .footer-social a { 
            color: #fff; font-size: 24px; width: 50px; height: 50px; 
            border: 1px solid #444; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .footer-social a:hover { background: var(--primary-green); border-color: var(--primary-green); transform: scale(1.1); }
        .footer-bottom { border-top: 1px solid #333; padding-top: 20px; font-size: 14px; color: #aaa; }

        @media(max-width: 768px) {
            nav { flex-direction: column; height: auto; padding: 15px; gap: 15px; }
            .auth-buttons { border: none; padding: 0; }
            header h1 { font-size: 2rem; }
            .plant-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">🌿 ভেষজ চিকিৎসা কোষ</a>
    
    <div class="nav-right">
        <div class="social-icons-nav">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
        </div>
        
        <div class="auth-buttons">
            <a href="login.html" class="btn btn-login">লগইন</a>
            <a href="signup.html" class="btn btn-signup">সাইন-আপ</a>
        </div>
    </div>
</nav>

<header>
    <h1>ভেষজ চিকিৎসা কোষ</h1>
    <p>প্রকৃতির ছোঁয়ায় সুস্থ থাকুন প্রতিদিন</p>
</header>

<div class="search-area">
    <input type="text" id="searchInput" onkeyup="searchFunction()" placeholder="গাছের নাম লিখে খুঁজুন...">
</div>

<div class="container">
    <div class="plant-grid" id="plantList">
        <!-- আপনার ১৪১টি লিস্ট এখানে (নমুনা হিসেবে কয়েকটি দেওয়া হলো) -->
        <a href="aam.html" class="plant-card"><i class="fas fa-leaf"></i><span>১. আম</span></a>
        <a href="ada.html" class="plant-card"><i class="fas fa-leaf"></i><span>২. আদা</span></a>
        <a href="akanda.html" class="plant-card"><i class="fas fa-leaf"></i><span>৩. আকন্দ</span></a>
        <a href="alkushi.html" class="plant-card"><i class="fas fa-leaf"></i><span>৪. আলকুশি</span></a>
        <a href="aloevera.html" class="plant-card"><i class="fas fa-leaf"></i><span>৫. ঘৃতকুমারী</span></a>
        <!-- বাকি ১৪১টি আইটেম একইভাবে যুক্ত হবে -->
    </div>
</div>

<footer>
    <div class="footer-social">
        <a href="https://facebook.com" title="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://youtube.com" title="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="https://whatsapp.com" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <a href="mailto:info@example.com" title="Email"><i class="fas fa-envelope"></i></a>
    </div>
    <div class="footer-bottom">
        <p>© ২০২৬ <b>ভেষজ চিকিৎসা কোষ</b> | মোঃ দুলাল হোসেন কর্তৃক সংরক্ষিত</p>
    </div>
</footer>

<script>
function searchFunction() {
    let input = document.getElementById("searchInput");
    let filter = input.value.toUpperCase();
    let grid = document.getElementById("plantList");
    let cards = grid.getElementsByClassName("plant-card");

    for (let i = 0; i < cards.length; i++) {
        let name = cards[i].getElementsByTagName("span")[0];
        if (name.innerHTML.toUpperCase().indexOf(filter) > -1) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
