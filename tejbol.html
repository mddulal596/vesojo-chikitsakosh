<!DOCTYPE html>
<html lang="bn">
<head><meta charset="UTF-8"><title>তেজবল - ভেষজ চিকিৎসাকোষ</title>
<style>body{font-family:Arial;line-height:1.8;max-width:800px;margin:auto;padding:20px;background:#f4f7f6;}.card{background:#fff;padding:40px;border-radius:15px;border-top:10px solid #27ae60;}h1{color:#27ae60;text-align:center;}h2{color:#e67e22;border-left:5px solid #e67e22;padding-left:10px;}</style></head>
<body><div class="card">
    <h1>তেজবল (Tejbal)</h1>
    <h2>রোগের বিবরণ:</h2> <p>দাঁত ব্যথা এবং মাড়ির ইনফেকশন সারাতে তেজবল ফলের খোসা অব্যর্থ কাজ করে।</p>
    <h2>ব্যবহৃত অংশ:</h2> <p>ফল ও ছাল।</p>
    <h2>ঔষধ তৈরির পদ্ধতি:</h2> <p>ফল বা ডাল চিবিয়ে রস মুখে কিছুক্ষণ ধরে রাখতে হয়।</p>
    <h2>খাবার নিয়ম:</h2> <p>তীব্র দাঁত ব্যথায় ১টি ফল চিবিয়ে ধরুন, কয়েক মিনিটের মধ্যেই ব্যথা কমে যাবে।</p>
</div></body></html>
